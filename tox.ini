[tox]
envlist = py39, lint, format
isolated_build = True

[testenv]
description = Run unit tests with coverage
deps =
    pytest
    pytest-cov
commands =
    pytest --cov=aeclib --cov-report=term-missing

[testenv:lint]
description = Run static analysis and linting
deps =
    ruff
commands =
    ruff check src/ tests/

[testenv:format]
description = Run auto-formatting check
deps =
    ruff
commands =
    ruff format --check src/ tests/

[testenv:fix]
description = Automatically fix linting and formatting issues
deps =
    ruff
commands =
    ruff check --fix src/ tests/
    ruff format src/ tests/
